name: Deploy GlobalMart React App with SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ARTIFACT_NAME: globalmart-app.zip
  EC2_TAG_NAME: GlobalMart-WebServer
  ARTIFACT_BUCKET: globalmart-codedeploy-artifacts-443245369180

jobs:
  build-and-deploy:
    name: Build and Deploy to EC2 using SSM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: CI=false npm run build

      - name: Zip build folder
        run: |
          zip -r $ARTIFACT_NAME build

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::443245369180:role/GlobalMart-GitHubActions-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        run: |
          aws s3 cp $ARTIFACT_NAME s3://$ARTIFACT_BUCKET/$ARTIFACT_NAME

      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$EC2_TAG_NAME" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy GlobalMart React app from GitHub Actions" \
            --parameters "commands=[
              \"set -e\",
              \"aws s3 cp s3://globalmart-codedeploy-artifacts-443245369180/globalmart-app.zip /tmp/globalmart-app.zip\",
              \"rm -rf /tmp/globalmart-deploy\",
              \"mkdir -p /tmp/globalmart-deploy\",
              \"unzip -o /tmp/globalmart-app.zip -d /tmp/globalmart-deploy\",git add .github/workflows/
              \"rm -rf /usr/share/nginx/html/*\",
              \"cp -r /tmp/globalmart-deploy/build/* /usr/share/nginx/html/\",
              \"chmod -R 755 /usr/share/nginx/html\",
              \"systemctl restart nginx\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.get-instance.outputs.instance_id }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.get-instance.outputs.instance_id }}"